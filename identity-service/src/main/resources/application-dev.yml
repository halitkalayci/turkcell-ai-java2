spring:
  datasource:
    url: jdbc:h2:mem:identitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:demo-secret-key-for-development-only-min-256-bits-required-do-not-use-in-production}
  issuer: identity-service
  audience: turkcell-microservices

logging:
  level:
    com.turkcell.identityservice: DEBUG
    org.springframework.security: DEBUG
